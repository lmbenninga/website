    body {

    .collab-x {

    .bft-logo {
      height: clamp(128px, 28vw, 192px);
      width: auto;
      object-fit: contain;

      background: #fff;
      padding: 32px 28px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 16px;
    }

    .offer-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #2020EE;
      margin-bottom: 8px;
    }

    .offer-claim {
      font-size: clamp(48px, 11vw, 72px);
      font-weight: 900;
      line-height: 1;
      color: #2020EE;
      letter-spacing: -0.03em;

      font-weight: 400;
      color: #888;

      font-family: 'Poppins', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 700;
      border-radius: 18px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 40px rgba(32, 32, 238, 0.55), 0 2px 12px rgba(32, 32, 238, 0.35);
      transition: box-shadow 0.2s ease, transform 0.15s ease;
    }

    .cta-btn:hover {
      box-shadow: 0 12px 50px rgba(32, 32, 238, 0.7), 0 4px 16px rgba(32, 32, 238, 0.45);
      transform: translateY(-1px);
    }

    .cta-btn:active {
      transform: translateY(0);

    .cta-arrow {
      font-size: 18px;
      line-height: 1;
