<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Social Limits × Adobe — Exclusive 50% Off</title>
  <meta name="description" content="Exclusive Adobe offer: claim 50% off Social Limits — the app that blocks your social media until you hit your step count."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', system-ui, sans-serif;
      background: #EFEFEF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .page {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    .brand-title {
      font-size: clamp(64px, 14vw, 96px);
      font-weight: 900;
      line-height: 1;
      color: #2020EE;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
    }

    .collab {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .collab-x {
      font-size: 22px;
      font-weight: 500;
      color: #555;
    }

    .adobe-wordmark {
      font-size: 26px;
      font-weight: 800;
      color: #FF1F1F;
      letter-spacing: -0.01em;
    }

    .tagline {
      font-size: 16px;
      font-weight: 400;
      color: #666;
      line-height: 1.5;
      max-width: 320px;
      margin-bottom: 32px;
    }

    .offer-card {
      width: 100%;
      border: 2.5px solid #2020EE;
      border-radius: 24px;
      background: #fff;
      padding: 32px 28px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 16px;
    }

    .offer-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #2020EE;
      margin-bottom: 8px;
    }

    .offer-claim {
      font-size: clamp(52px, 12vw, 76px);
      font-weight: 900;
      line-height: 1;
      color: #2020EE;
      letter-spacing: -0.03em;
    }

    .offer-amount {
      font-size: clamp(64px, 15vw, 96px);
      font-weight: 900;
      line-height: 1;
      color: #2020EE;
      letter-spacing: -0.04em;
    }

    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 20px 28px;
      background: #2020EE;
      color: #fff;
      font-family: 'Poppins', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 700;
      border-radius: 18px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 40px rgba(32, 32, 238, 0.55), 0 2px 12px rgba(32, 32, 238, 0.35);
      transition: box-shadow 0.2s ease, transform 0.15s ease;
    }

    .cta-btn:hover {
      box-shadow: 0 12px 50px rgba(32, 32, 238, 0.7), 0 4px 16px rgba(32, 32, 238, 0.45);
      transform: translateY(-1px);
    }

    .cta-btn:active {
      transform: translateY(0);
    }

    .cta-arrow {
      font-size: 18px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1 class="brand-title">Social<br>Limits</h1>

    <div class="collab">
      <span class="collab-x">×</span>
      <span class="adobe-wordmark">Adobe</span>
    </div>

    <p class="tagline">The app that blocks your social media until you hit your step count.</p>

    <div class="offer-card">
      <div class="offer-eyebrow">Exclusive Adobe Offer</div>
      <div class="offer-claim">Claim</div>
      <div class="offer-amount">50% OFF</div>
    </div>

    <a class="cta-btn" href="https://apps.apple.com/au/app/social-limits-screen-time-app/id6471964510" target="_blank" rel="noopener">
      Click here to claim my 50% off <span class="cta-arrow">→</span>
    </a>
  </div>
</body>
</html>
